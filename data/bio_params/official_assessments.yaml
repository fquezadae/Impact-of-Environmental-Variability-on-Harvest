    enfoque: "habitat variability analysis 2012-2025 para flota S-C Chile"
    cita: "SPRFMO SC13-ECO02 (2025)"

# -----------------------------------------------------------------------------
#                        NOTAS DE IMPLEMENTACIÓN
# -----------------------------------------------------------------------------
implementacion:
  modelo_bio: "Pella-Tomlinson con shape n=2 (= Schaefer)"
  ley_movimiento: |
    X_{t+1} = X_t + r_i(SST_t, CHL_t) * X_t * (1 - (X_t/K_i)^(n-1)) - C_{i,t}
    donde r_i(SST, CHL) = r_i^0 * exp(ρ_i^SST * (SST - SST_bar) +
                                       ρ_i^CHL * log(CHL / CHL_bar))
  parametros_a_estimar:
    - "r_i^0 para cada especie (3 params)"
    - "K_i para cada especie (3 params)"
    - "ρ_i^SST para cada especie (3 params)"
    - "ρ_i^CHL para cada especie (3 params)"
    - "σ_proc (proceso) para cada especie"
    - "σ_obs (observación) si SSB es observado con error"
  dimension_total: "~15-18 parámetros, tractable con N>30 años de serie y priors informativos"
  calibracion: "Stan via cmdstanr, state-space con ley Markov"
  datos_objetivo:
    - "Biomasa acústica serie anual (IFOP RECLAS+PELACES, 1999-2024) — obs. directa"
    - "SSB serie anual MPDH (IFOP, 2002-2024) — opcional, observación complementaria"
    - "C serie anual por especie (SERNAPESCA o Seguimiento IFOP)"
    - "SST mensual → anualizada (CMIP6 histórico + ERA5/OISST)"
    - "Chl-a mensual → anualizada (CMEMS/MODIS)"
  observaciones_disponibles:
    acoustic_csv: "data/bio_params/acoustic_biomass_series.csv"
    acoustic_n_annual_points_sardina_cs:  45   # RECLAS + PELACES 1999-2024
    acoustic_n_annual_points_anchoveta_cs: 45   # RECLAS + PELACES 1999-2024
    acoustic_n_annual_points_jurel_cs:    25   # 2000-2024 con gaps
    MPDH_one_point: "SSB 2024 ± 2023 comparación (ver biologia_observacional)"
    # Precios y MP procesada (IFOP Encuesta Industrial 2012-2024) NO son input
    # para paper 1. Ese pipeline vive en R/01_data_cleaning/ifop_industrial_data.R
    # y alimenta paper 2 (bioeconomic Stackelberg). Los precios que aparecen en
    # paper 1 como covariables de la trip equation ya vienen deflactados a
    # constante 2018 pesos desde el Rmd principal, no de este YAML.
    raw_xlsx_copia: "data/bio_params/ifop_acoustic_raw.xlsx"
  # --- NUEVO 2026-04-21 (tarde): captura anual SERNAPESCA ---
  catch_annual_csv: "data/bio_params/catch_annual_paper1.csv"
  catch_annual_periodo: "2000-2023 (24 años)"
  catch_annual_fuente: "SERNAPESCA bd_desembarque (raw copia: sernapesca_bd_desembarque_raw.csv)"
  catch_split_sector_csv: "data/bio_params/catch_annual_paper1_by_sector.csv"
  catch_caveat: |
    (a) Industrial + Artesanal combinados (excluye Acuicultura/Fábrica).
    (b) Post-2013 anchoveta_cs y sardina_cs pasan a ~100% Artesanal
        (re-clasificación flota <18m art. 55 LGPA). El split I/A no es
        informativo como fleet-size control para estos stocks post-colapso.
    (c) Jurel Chile ≈ 15% del stock range-wide OROP-PS. Para paper 1 ver PEND-8.

  # --- NUEVO 2026-04-21: series oficiales de evaluación de stock (SSB/BT/R) ---
  # Fuente: Felipe Q. compilación IFOP evaluaciones directas/indirectas oficiales,
  # Datos_estimación biomasa.xlsx. GAME CHANGER — ya no dependemos solo de acústica.
  official_ssb_series_csv: "data/bio_params/official_biomass_series.csv"
  official_ssb_stocks:
    anchoveta_cs:
      years: "1997-2024 (28 años, anual)"
      cols_disponibles: ["ssb_t", "biomass_total_t", "recruits_mil_ind"]
      zona: "Valparaíso-Los Lagos (V-X)"
      unidades_verificadas: true  # SSB 2024 = 645,034 t consistente con IFOP Seguimiento
    sardina_comun_cs:
      years: "1991-2025 (35 años, anual)"
      cols_disponibles: ["ssb_t", "biomass_total_t", "recruits_mil_ind"]
      zona: "Valparaíso-Los Lagos (V-X)"
      unidades_verificadas: true
    jurel_orop_ps:
      years: "1970-2024 (55 años, anual)"
      cols_disponibles: ["ssb_t", "recruits_mil_ind"]  # NO biomass_total
      zona: "ZEE Chile-Ecuador y AJN Perú (range-wide SPRFMO)"
      unidad_ssb: "miles_de_t"  # RESUELTO 2026-04-21 por triangulación interna
      unidad_conversion_factor: 1000
      justificacion_unidades: |
        Felipe no tiene el documento fuente (IFOP envió el xlsx directamente).
        Resuelto por triangulación matemática: R_2024 = 18,326 × 10^6 ind con
        peso medio al recluta ~50-100 g → biomasa de reclutas 900-1800 kt. Si
        SSB fuera 17,738 t puros, ratio R_biomass / SSB ≈ 50-100, biológicamente
        absurdo. Con SSB en miles_t → 17.7 Mt → R/SSB ≈ 0.05-0.1, plausible.
        Para state-space Bayesiano la escala absoluta se absorbe en q, así
        que el posterior de r, ρ^SST, ρ^CHL no cambia.
    anchoveta_norte:
      years: "1985-2024 (40 años, anual)"
      cols_disponibles: ["ssb_t", "biomass_total_t", "recruits_mil_ind"]
      zona: "Atacama-Coquimbo (III-IV)"
      relevancia_paper1: "no target, pero útil para cross-validación ambiental"
    anchoveta_sur_peru_norte_chile:
      years: "1986-2024.5 (78 puntos semianuales)"
      cols_disponibles: ["ssb_t", "biomass_total_t", "recruits_mil_ind"]
      zona: "Arica_Parinacota-Antofagasta (XV-II), stock compartido Chile-Perú"
      unidad_ssb: "miles_de_t"  # RESUELTO 2026-04-21 por comparación con deep-research K range
      unidad_conversion_factor: 1000
      justificacion_unidades: |
        Valores máximos en tabla: ~2,672. Si la unidad es t puras, SSB máximo
        2.7 kt es absurdo para este stock. Deep research confirma K ≈ 7.8-12.7 Mt
        para el stock combinado Imarpe-IFOP 2018, y 2672 × 1000 = 2.67 Mt
        que encaja como SSB en fracción de K. Consistente.
      relevancia_paper1: "no target (paper1 es centro-sur)"
    sardina_austral_los_lagos:
      years: "2002-2024 (23 años, anual)"
      cols_disponibles: ["ssb_t", "biomass_total_t", "recruits_mil_ind"]
      zona: "Región de Los Lagos (X)"
      relevancia_paper1: "no target, pero útil comparativo"

