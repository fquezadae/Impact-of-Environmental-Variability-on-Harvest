# =============================================================================
# FONDECYT -- official_assessments.yaml
#
# Parámetros de stock assessment oficiales adoptados para el modelo
# estructural bio-ambiental del paper 1 (V2).
#
# Fuentes:
#   [CCT]   Informe Técnico (R. Pesq.) N°XX/2025 -- 2da Sesión 2025 del CCT-PP,
#           SUBPESCA. Documento "subpesca_cctpp_2025.pdf".
#   [IFOP-SEG]   Informe Final Convenio Desempeño 2023, Programa de Seguimiento
#                Pesquerías Pelágicas centro-sur de Chile, IFOP, Oct 2024.
#                (Documento de MONITOREO, no de evaluación de stock. Aporta
#                TMM, estructura de edad, L-W, timing reproductivo.)
#   [IFOP-MPDH]  Informe Final MPDH 2024 (Donoso et al., IFOP, Jul 2025).
#                Método producción diaria huevos → SSB observacional directa.
#   [IFOP-ACU]   Informe Final Evaluación Hidroacústica 2024 (Saavedra Godoy
#                et al., IFOP, Feb 2026). Biomasa total + abundancia acústica,
#                serie 2006-2025 (en figuras, requiere digitalización).
#                L-W frescos verano+otoño 2025.
#   [SPRFMO] SPRFMO SC13-Report, Sep 2025 (Manta, Ecuador). Annex 10
#           (Stock status summary for Jack Mackerel) + cuerpo del informe.
#           Modelo JJM, github.com/SPRFMO/jjm.
#   [LIT]   Valor adoptado de literatura / meta-análisis. Se documenta
#           referencia bibliográfica junto al prior.
#
# PENDIENTE: r, K, M específicos del modelo estadístico para sardina común
# y anchoveta centro-sur requieren bajar el "Informe de Evaluación de Stock"
# IFOP (documento distinto del Programa de Seguimiento). Mientras no esté,
# usamos priors de literatura razonables y centro-ajustamos con la serie SSB
# reportada por CCT-PP.
#
# Última actualización: 2026-04-21
# =============================================================================

metadata:
  version: "0.2"
  fecha: "2026-04-21"
  paper: "paper1_climate_projections"
  estado: "arquitectura CS-consistente adoptada 2026-04-21 tarde; priors r/K/M todavía de literatura"
  coordenadas: "zona centro-sur Chile (32°10'S-47°00'S) para las TRES especies (jurel_cs vía biomasa acústica IFOP + captura SERNAPESCA regiones V-X+Los Ríos)"
  pivot_2026_04_21: |
    Pivot arquitectural jurel: de ruta A (range-wide SPRFMO) a ruta CS-consistente.
    Motivación: el paper1 es centro-sur consistente. SÍ existe biomasa acústica
    de jurel a escala CS (acoustic_biomass_series.csv::jurel_cs, 25 obs 2000-2024)
    y SERNAPESCA permite agregar captura a nivel V-X+Los Ríos coherentemente.
    Se usa entrada nueva `jurel_cs` (este archivo) en vez de la entrada `jurel`
    que queda como referencia range-wide para supplementary/prior-source.

# -----------------------------------------------------------------------------
#                               ANCHOVETA CS
#                       (Engraulis ringens, 4° Región a LL)
# -----------------------------------------------------------------------------
anchoveta_cs:
  especie: "Engraulis ringens"
  unidad_stock: "centro-sur (V a X región)"
  modelo_oficial: "estadístico estructurado a la edad, base anual biológica (jul-jun)"

  status_actual:
    ano_biologico: "2024/25"
    fuente: "[CCT] Informe CCT-PP 2da Sesión 2025, §5.3.2"
    BD_actual_mil_t: 664                      # biomasa desovante (mil toneladas)
    BD_sobre_BDRMS: 1.428                     # depletion ratio (>1 → saludable)
    F_sobre_FRMS: 0.512                       # mortalidad relativa FMSY
    reclutamiento_2025_mil_millones: 40393    # individuos, edad 1
    probabilidad_sobreexplotacion: 0.01
    estado: "Plena Explotación"
    CBA_2026_rango_sin_remanentes_t: [180695, 225869]
    kobe: "verde (bajo FRMS y sobre BDRMS)"

  priors_biologicos:
    # M: mortalidad natural instantánea (yr⁻¹)
    M_mean: 1.30
    M_sd: 0.20
    M_fuente: "[IFOP-SCAA] M=1.3 yr⁻¹ usado en evaluación edad-estructura anchoveta III-IV regiones (Convenio IFOP-SUBPESCA 2021-2022). CAVEAT: cita obtenida vía deep-research ChatGPT con referencia [56†L879-L888] no verificada en fuente primaria. Rango plausible [1.0, 1.5]. Para centro-sur asumir mismo M (ambos son Engraulis ringens, solo difiere el stock management)."
    # Pella-Tomlinson shape (n=2 → Schaefer)
    shape_n: 2.0
    # r: intrinsic growth rate. Para clupeiformes costeros, r∈[0.8, 1.5]
    r_prior_mean: 1.0
    r_prior_sd: 0.3
    r_fuente: "[LIT] Thorson FishLife / MacCall 2009 para pequeños pelágicos"
    # K: carrying capacity. Centro-ajustar con BD histórica
    # Sin serie pública, asumir K ≈ 2 * BD_max_histórica como prior laxo
    K_prior_mean_mil_t: 1800
    K_prior_sd_mil_t: 900
    K_fuente: "prior laxo; se actualizará con serie IFOP"
    # Steepness (h) del stock-recruitment — solo si usamos Beverton-Holt
    h_prior_mean: 0.75
    h_prior_sd: 0.10
    h_fuente: "[LIT] Myers et al. 1999 para pequeños pelágicos"

  biologia_observacional:
    TMM_cm: null                              # IFOP Seguimiento no lo reporta aquí
    edad_max: 4                               # grupos de edad 0-IV típicos
    L_W_verano_2025: {a: 0.00278, b: 3.3722, fuente: "IFOP Evaluación Hidroacústica 2024 (crucero ene-feb 2025)"}
    L_W_otono_2025:  {a: 0.00296, b: 3.3407, fuente: "IFOP Evaluación Hidroacústica 2024 (crucero abr-may 2025)"}
    desove_principal: "ago-dic"               # [IFOP §1 resumen ejecutivo]
    desove_inicio_ciclo: "jul"
    desove_fin_ciclo: "primeros meses año siguiente"
    # Observaciones directas (input para state-space Bayesiano)
    SSB_MPDH_2024_t: 59144                    # CV 22.5% [IFOP MPDH 2024]
    SSB_MPDH_2023_t: 389174                   # referencia comparativa [IFOP MPDH]
    biomasa_acustica_2025_verano_t: 764580    # biomasa total (incluye juveniles)
    biomasa_acustica_2025_otono_t:  1081914
    juveniles_frac_verano: 0.013              # solo 1.3% juveniles en verano (anchoveta madura dominante)
    juveniles_frac_otono:  0.297              # reclutamiento evidente en otoño

  regulacion:
    instrumento_TAC: "CBA por año biológico (jul-jun)"
    HCR_tipo: "target FRMS con ajustes precautorios CCT-PP"
    fraccion_artesanal: 0.78                  # ~78% de cuota global en artesanal
    fraccion_industrial: 0.22

