# -----------------------------------------------------------------------------
#                                   JUREL
#                        (Trachurus murphyi, range-wide SE Pacific)
# -----------------------------------------------------------------------------
# NOTA: El stock de jurel es range-wide (Perú, Chile, altamar). Para paper 1
# vamos a usar la flota **chilena** centro-sur (S-C) como objeto de análisis,
# pero la dinámica biomass proviene del stock global SPRFMO.
jurel:
  especie: "Trachurus murphyi"
  unidad_stock: "SPRFMO SE Pacific, range-wide (stock chileno S-C es subcomponente)"
  modelo_oficial: "JJM (Joint Jack-mackerel Model), statistical catch-at-age multi-fleet"
  modelo_codigo: "github.com/SPRFMO/jjm"
  hipotesis_stock: ["H1 (1-stock)", "H2 (2-stock: N y S)"]

  status_actual:
    ano: 2025
    fuente: "[SPRFMO] SC13 Annex 10, Sep 2025"
    F_sobre_FMSY: "below"                     # cualitativo en el anexo, no hay cifra
    SSB_sobre_BMSY: "above 100%"
    kobe: "verde (both 2024 y 2025)"
    catch_2024_t: 1330070                     # range-wide preliminar
    catch_2025_t: 1384404                     # preliminar
    TAC_2025_CMM_t: 1552500
    TAC_2026_advice_t: [1642200, 1785400]     # rango por falta de consenso SC
    periodo_baja_productividad: "2000-2022 explícito en S-R"
    reclutamientos_recientes: "altos en 2024-2025"

  priors_biologicos:
    # M actualizado: jjmr docs SPRFMO reportan M ≈ 0.28-0.33 (no 0.23)
    M_mean: 0.30
    M_sd: 0.05
    M_fuente: "[SPRFMO/jjmr] documentación paquete jjmr, operating model H1 v1.07 (SCW15 2025)"
    shape_n: 2.0
    r_prior_mean: 0.35
    r_prior_sd: 0.10
    r_fuente: "[LIT] FishLife para Trachurus spp."
    # K range-wide bastante mayor que sardina/anchoveta; estimación con MSY/r
    # MSY estimado ~ 1500 kt/año → K ≈ 4*MSY/r ~ 17 M t (muy laxo)
    K_prior_mean_mil_t: 17000
    K_prior_sd_mil_t: 8000
    K_fuente: "prior laxo; centro-ajustar con series del h1_1.07.qs (SCW15_report)"
    # steepness: jjmr usa h ≈ 0.65 en H1 v1.07, no 0.80
    h_prior_mean: 0.65
    h_prior_sd: 0.10
    h_fuente: "[SPRFMO/jjmr] operating model H1 v1.07 default steepness"

  biologia_observacional:
    edad_max: 15                              # GE 0 a XV
    edades_dominantes_2023: ["GE V (2018)", "GE VI (2017)"]   # [IFOP §1]
    TML_mencionada: true
    desove_patron: "hembras mayormente en reposo; patrón histórico estable"
    habitat_S_C:
      fuente: "[SPRFMO] SC13-ECO02"
      fishing_grounds: "relativamente estables 2012-2025 bajo anomalías ENSO"
      tendencia_largo_plazo: "SST más fría, mayor productividad cerca de upwelling"
      patron_talla_espacio: "juveniles al norte (aguas más cálidas/productivas), adultos al sur (más frías)"

  regulacion:
    instrumento_TAC: "TAC CMM SPRFMO + asignación nacional por país"
    HCR_tipo: "Adjusted Annex K"              # [SPRFMO] Annex 12
    HCR_estabilizador: "±15% interanual"
    HCR_Blim: "γ_lim * B0,t, con γ_lim = min(Bt/B0,t)"
    cuota_chile_S_C_frac: null                # hay que bajarla del Decreto Subpesca
    fraccion_artesanal: 0.10                  # ~10% en Chile S-C típico
    fraccion_industrial: 0.90
    flota_industrial_chile_S_C: "24 naves (2023), 100% dentro ZEE"

# -----------------------------------------------------------------------------
#                                JUREL CS
#         (Trachurus murphyi, subcomponente centro-sur Chile, V a X+LosRíos)
# -----------------------------------------------------------------------------
# NUEVO 2026-04-21 tarde (pivot arquitectural). Esta es la entrada canónica
# para jurel en paper 1. La entrada `jurel` de arriba queda como referencia
# range-wide SPRFMO para usos supplementary.
#
# Escala: biomasa acústica IFOP crucero Mayo-Julio (centro-sur, Valparaíso-
# Los Ríos en la cobertura del crucero, stock manejado hasta Los Lagos).
# Captura: SERNAPESCA bd_desembarque agregado a V-X+Los Ríos (ver script
# R/07_structural_bio/08_build_jurel_cs_catch.R).
jurel_cs:
  especie: "Trachurus murphyi (subcomponente centro-sur Chile)"
  unidad_stock: "centro-sur Chile (V a X + Los Ríos), subcomponente del stock range-wide SPRFMO"
  modelo_oficial: "no hay evaluación age-structured oficial a escala CS; target es biomasa acústica IFOP"
  relacion_con_rangewide: |
    Share captura CS / Chile-total varía entre 50-95% según fase del crash
    (alto pre-2008, baja durante el crash 2008-2013 cuando la flota migra al
    norte, alto post-2017). Share biomasa CS / SSB range-wide típicamente
    ~3-10% según SSB range-wide vs biomasa acústica CS. No usar share
    constante; la variabilidad temporal es informativa.

  status_actual:
    ano: 2024
    fuente: "[IFOP-ACU] Biomasa acústica crucero Junio-Julio 2023"
    biomasa_acustica_2023_t: 837349
    biomasa_acustica_2020_t: 1548640           # pico post-recuperación
    biomasa_acustica_2001_t: 6146418           # pico histórico pre-crash
    crash_minimo_t: 89736                       # 2010
    estado_cualitativo: "recuperación parcial post-crash 2008-2013"

  priors_biologicos:
    # M: misma biología que stock range-wide (invariante de escala)
    M_mean: 0.30
    M_sd: 0.05
    M_fuente: "[SPRFMO/jjmr] operating model H1 v1.07"
    shape_n: 2.0
    # r: biológico invariante de escala; mismo valor que entrada `jurel` range-wide
    r_prior_mean: 0.35
    r_prior_sd: 0.15                           # ampliado vs range-wide (0.10) por menor información a escala CS
    r_fuente: "[LIT] FishLife para Trachurus spp.; sd ampliada para reflejar incertidumbre de escala"
    # K: re-escalado para escala CS. Pico biomasa acústica 2001 = 6.15 Mt.
    # Grid search hindcast T3 (R/07_structural_bio/02_hindcast_check.R) encontró
    # best-fit en K=29 Mt pero eso es sospechoso (rangewide scale-ish,
    # biológicamente implausible — ver nota abajo). Valor adoptado combina:
    #   - pico acústico observado (6.15 Mt) como lower bound plausible
    #   - estimación de capacidad histórica pre-crash (~10-15 Mt razonable
    #     para región CS dadas las capturas 1.4 Mt/año sostenidas 2000-2007)
    K_prior_mean_mil_t: 8000
    K_prior_sd_mil_t: 5000                     # prior amplio; state-space T4 lo afina
    K_fuente: "re-escalado a CS desde K range-wide (17 Mt) × share histórico CS ~0.3-0.5; confirmación de magnitud vs pico acústico 2001=6.15 Mt"
    h_prior_mean: 0.65
    h_prior_sd: 0.10
    h_fuente: "[SPRFMO/jjmr] H1 v1.07 default"
    caveat_grid_hindcast: |
      El grid search determinístico de T3 encontró r_best=0.20, K_best=29 Mt
      con median|err%|=20.5%. NO adoptar ese K como prior: es un falso óptimo
      que compensa la incapacidad de Schaefer determinístico de replicar el
      crash rápido + recuperación parcial. En T4 con shifter climático ese
      grado de libertad ya no será necesario.

  biologia_observacional:
    fuente_biomasa: "IFOP crucero acústico junio-julio (tabla ESTIMACIONES CRUCERO ACUSTICO)"
    cobertura_crucero: "Valparaíso-Los Ríos (V-XIV), stock manejado hasta Los Lagos"
    n_observaciones: 25
    periodo: "2000-2024"
    gaps: [2013, 2014, 2016, 2018, 2019, 2022, 2024]
    no_detecciones:                            # tratar como missing/censored en Stan
      - {year: 2012, biomass_t: 2547,  nota: "valor anómalo muy bajo, probablemente no-detección"}
      - {year: 2015, biomass_t: 0,     nota: "explícitamente 0 en la tabla, claramente no-detección"}

  regulacion:
    instrumento_TAC: "cuota nacional Chile, dentro del TAC CMM SPRFMO"
    cuota_artesanal_nacional_frac: 0.10
    cuota_industrial_nacional_frac: 0.90
    flota_industrial_V_X: "~24 naves cerqueras >60 m (SPRFMO SC13-ECO02 2025)"

  # Serie de captura a adoptar (NOT jurel_chile)
  catch_series_csv: "data/bio_params/catch_jurel_cs.csv"
  catch_series_build_script: "R/07_structural_bio/08_build_jurel_cs_catch.R"
  catch_regions_incluidas: ["Valparaíso", "O'Higgins", "Maule", "Bío-Bío",
                            "La Araucanía", "Los Ríos", "Los Lagos"]
  catch_tipos_agente: ["Industrial", "Artesanal"]

